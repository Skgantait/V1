<nav class="sidebar" [class.show-sidebar]="sidebarVisible" id="sidebar">
  <button class="menu__toggle" id="menu-toggle" (click)="toggleSidebar()">
    <i class="ri-menu-line"></i>
  </button>

  <div class="sidebar__container">
    <div class="sidebar__content">
      <div class="sidebar__list">
        <ul class="collapsible-menu" data-collapsible-menu="slide">

          @for (cat of categories; track cat.key) {
          <li>
            <a class="sidebar__title sidebar__link"
               [class.collapsed]="!cat.open"
               [class.expanded]="cat.open"
               (click)="toggleCategory(cat)">
              <img [src]="cat.icon" width="14" height="14" [title]="cat.key">
              <span>{{ cat.key }}</span>
            </a>

            <!-- Statistics uses a special always-open div like the original -->
            @if (cat.key === 'Statistics') {
            <div class="stats-always-open"
                 [style.display]="cat.open ? 'block' : 'none'"
                 style="padding: 0 0 0 36px; margin: 6px 0 14px 0;">
              @for (fn of cat.items; track fn) {
              <a href="javascript:void(0)"
                 (click)="onFuncClick(fn)"
                 style="display:block; color:#333; font-size:12px; line-height:18px; margin: 2px 0;">
                <i class="ri-arrow-drop-right-fill"></i>{{ fn }}
              </a>
              }
            </div>
            } @else {
            <!-- Regular category submenu -->
            <ul [style.display]="cat.open ? 'block' : 'none'">
              @for (fn of cat.items; track fn) {
              <li>
                <a href="javascript:void(0)"
                   (click)="onFuncClick(fn)"
                   class="sidebar__link">
                  <i class="ri-arrow-drop-right-fill"></i>{{ fn }}
                </a>
              </li>
              }
            </ul>
            }
          </li>
          }

        </ul>
      </div>
    </div>
    <div class="sidebar__actions"></div>
  </div>
</nav>
