    <style type="text/css">
.modal {
  display: none;
  position: fixed;
  z-index: 1;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgb(0,0,0);
  background-color: rgba(0,0,0,0.4);
}
.modal-content {
  display: none;
  background-color: #fefefe;
  margin: 15% auto;
  padding: 20px;
  border: 1px solid #888;
  width: 400px;
}
    </style>

    <style>
.ulm {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #38444d;
}
.ulm li { all: unset; }
.lim { float: left; }
.lim a {
  all: unset;
  display: inline-block;
  color: white;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  cursor: pointer;
}
.lim a:hover { background-color: #2980B9; }
.dropbtn {
  color: white;
  padding: 14px 16px;
  text-decoration: none;
  background-color: #38444d;
  border: none;
  cursor: pointer;
}
.dropbtn:hover { background-color: #2980B9; }
.dropdown {
  position: relative;
  display: inline-block;
}
.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f1f1f1;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}
.dropdown-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
}
.dropdown-content a:hover { background-color: #ddd; }
.show { display:block; }
.hscroll {
  padding: 5px;
  margin-bottom: 15px;
  width: 100%;
  height: 300px;
  overflow-x: hidden;
  overflow-y: auto;
}
    </style>

</head>
<body>
    <!-- Preloader -->

        <div id="status" class="la-ball-triangle-path">

        </div>
    </div>

    <div class="page-border" data-wow-duration="0.7s" data-wow-delay="0.2s">
        <div class="top-border wow fadeInDown animated"></div>
        <div class="right-border wow fadeInRight animated"></div>
        <div class="bottom-border wow fadeInUp animated"></div>
        <div class="left-border wow fadeInLeft animated"></div>
    </div>
