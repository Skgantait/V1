<script type="text/javascript">
    function search(){
        if (document.getElementById("search").value != ""){
            var str = "index.html?srch=" + document.getElementById("search").value;
            window.location.href = str;
        }
    }

    function funcpost(s){
        var strtw = "index.html?fnm=" + s;
        window.location.href = strtw;
    }

    function createNew(){
        var strtw = "index.html";
        window.location.href = strtw;
    }

    //=========MODAL SECTION==========
    var modal = document.getElementById("myModal");
    var content1 = document.getElementById("content1");
    var content2 = document.getElementById("content2");
    var content3 = document.getElementById("content3");

    function insrt(e){
        document.getElementById("custId").value = e.options[e.selectedIndex].innerHTML;
    }

    function getCategory(){
        modal.style.display = "block";
        content1.style.display = "block";
        var tmp = document.getElementById("main-categori").innerHTML;
        for (var option of document.getElementById("cat").options) {
            if (option.value == tmp) { option.selected = true; break; }
        }
        document.getElementById("custId").value = document.getElementById("main-categori").innerHTML;
    }

    function mcontent(){
        content1.style.display = "none";
        modal.style.display = "none";
        document.getElementById("main-categori").innerHTML = document.getElementById("custId").value;
    }

    function getBlankData(){
        var dobjectarr = {};
        var keys = ['DoubleScaler','ComplexScaler','NumericScaler','DateTime','String','Logical','IntegerScaler','ByteScaler','DoubleMatrix','ComplexMatrix','NumericMatrix','LogicalMatrix','IntegerMatrix','ByteMatrix','DoubleField','ComplexField','NumericField','DateTimeField','StringField','LogicalField','IntegerField','ByteField','DoubleTable','ComplexTable','NumericTable','DateTimeTable','StringTable','LogicalTable','IntegerTable','ByteTable','DoubleMatrixArray','ComplexMatrixArray','NumericMatrixArray','LogicalMatrixArray','IntegerMatrixArray','ByteMatrixArray'];
        keys.forEach(function(k){ dobjectarr[k] = ''; });
        return dobjectarr;
    }

    var newData = {};
    var objc;
    var dObject = document.getElementsByClassName('dObject');
    for (var i = 0; i < dObject.length; i++){
        dObject[i].addEventListener('click', function (event) {
            if (event.target.checked){ newData[event.target.id] = event.target.value; }
            else { newData[event.target.id] = ''; }
        });
    }

    function getData(e){
        objc = e;
        newData = getBlankData();
        var ptxt = e.innerHTML;
        var parr = ptxt.split(' | ');
        parr[0] = parr[0].split(': ')[1];
        for (var i = 0; i < dObject.length; i++){ dObject[i].checked = false; }
        for (var j = 0; j < parr.length; j++){
            for (var i = 0; i < dObject.length; i++){
                if (parr[j] == dObject[i].value){ dObject[i].checked = true; newData[dObject[i].id] = dObject[i].value; break; }
            }
        }
        modal.style.display = "block";
        content2.style.display = "block";
    }

    function mdata(){
        var str = "";
        for (var name in newData) {
            if (newData[name] != ""){
                if (str == ""){ str = newData[name]; }
                else { str = str + ' | ' + newData[name]; }
            }
        }
        objc.innerHTML = "Data Types: " + str;
        newData = {};
        content2.style.display = "none";
        modal.style.display = "none";
    }

    function dropdowntoggle(src) {
        if (src === undefined) src = true;
        var x = document.getElementById("myDropdown");
        if (x.className.indexOf("show") == -1) { if (src == true){ x.className += "show"; } }
        else { x.className = x.className.replace("show", ""); }
    }

    const img = document.getElementById('file');
    var htmlobject;

    function getHTMLEditor(e){
        htmlobject = e;
        document.getElementById("w3review").value = htmlobject.innerHTML;
        document.getElementById("htmledtr").innerHTML = "HTML Editor: " + htmlobject.id;
        modal.style.display = "block";
        content3.style.display = "block";
    }

    function copyTextToClipboard(text){
        if (!text) return;
        if (navigator.clipboard && window.isSecureContext){
            navigator.clipboard.writeText(text).catch(function(){
                fallbackCopyTextToClipboard(text);
            });
        } else {
            fallbackCopyTextToClipboard(text);
        }
    }

    function fallbackCopyTextToClipboard(text){
        var textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.setAttribute("readonly", "");
        textArea.style.position = "fixed";
        textArea.style.opacity = "0";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try { document.execCommand("copy"); } catch (err) { }
        document.body.removeChild(textArea);
    }

    function appendToHtmlEditor(text){
        if (!text) return;
        var editor = document.getElementById("w3review");
        if (!editor) return;
        if (editor.value && !editor.value.endsWith("\n")) editor.value += "\n";
        editor.value += text;
    }

    function makeCodeId(){
        var elementArray = document.getElementsByClassName("codespan");
        let l = 0;
        for(var i = 0; i < elementArray.length; i++) {
            var j = Number(elementArray[i].id.replace("code", ""));
            if (j > l){ l = j; }
        }
        return "code" + (l + 1);
    }

    function toolsclick(tool){
        dropdowntoggle(false);
        var textContent = "";
        if (tool == 'div') textContent = "<div>\nInsert Your Div Contant...\n</div>";
        else if (tool == 'p') textContent = "<p>Insert New Paragraph...</p>";
        else if (tool == 'h3') textContent = "<h3>Insert A Header...</h3>";
        else if (tool == 'list') textContent = "<ul>\n<li>\nInsert 1st List Content\n</li>\n</ul>";
        else if (tool == 'link') textContent = "<a href='Your-URL' target='_blank'>Your Hyper-Link Text...</a>";
        else if (tool == 'code'){
            var j = makeCodeId();
            textContent = '<div class="code">\n<pre>\n<span class="codespan" id="' + j + '">Insert Your Code...</span>\n</pre>\n<button class="codeButton" title="Copy Code to Clipboard" onclick="codeCopy(' + "'" + j + "')" + '"><i class="fa fa-copy"></i></button>\n</div>';
        }
        if (textContent != ""){
            appendToHtmlEditor(textContent);
            copyTextToClipboard(textContent);
        }
    }

    function imgclick(){ dropdowntoggle(false); img.click(); }

    function tableclick(){
        dropdowntoggle();
        var tcd = '<table class="matrx">\n<caption>Put Your Table Header..</caption>\n<tbody>';
        var r = Number(document.getElementById("tablerow").value);
        var c = Number(document.getElementById("tablecol").value);
        if (r > 0 && c > 0){
            for (var i = 0; i < r; i++){
                var txt = '<tr>\n';
                for (var j = 0; j < c; j++){ txt = txt + '<td>R' + i + 'C' + j + '</td>\n'; }
                tcd = tcd + txt + '</tr>\n';
            }
        }
        tcd = tcd + '</tbody></table>';
        appendToHtmlEditor(tcd);
        copyTextToClipboard(tcd);
    }

    function hdata(){
        htmlobject.innerHTML = document.getElementById("w3review").value;
        content3.style.display = "none";
        modal.style.display = "none";
    }

    function mclose(){
        newData = {};
        content1.style.display = "none";
        content2.style.display = "none";
        content3.style.display = "none";
        modal.style.display = "none";
    }
</script>
